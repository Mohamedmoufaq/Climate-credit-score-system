<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Climate Credit Flask App</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f3f7fb; color: #111; margin: 0; padding: 0; }
        .page { max-width: 720px; margin: 3rem auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,.08); }
        h1 { margin-top: 0; }
        label { display: block; margin: 1rem 0 0.5rem; font-weight: 600; }
        input, textarea { width: 100%; padding: 0.85rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; }
        button { margin-top: 1rem; padding: 0.95rem 1.4rem; border: none; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; font-size: 1rem; }
        .message { margin: 1rem 0; padding: 1rem 1.2rem; border-radius: 10px; }
        .error { background: #fee2e2; color: #991b1b; }
        .success { background: #d1fae5; color: #064e3b; }
    </style>
</head>
<body>
    <div class="page">
        <h1>Climate Credit Flask App</h1>
        <p>This app is deployed with Flask and Gunicorn on Render.</p>

        {% if error %}
            <div class="message error">{{ error }}</div>
        {% endif %}

        {% if result %}
            <div class="message success">{{ result }}</div>
        {% endif %}

        <form action="{{ url_for('submit') }}" method="post">
            <label for="name">Your name</label>
            <input type="text" id="name" name="name" value="{{ name or '' }}" placeholder="Enter your name" />

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" placeholder="Enter your message">{{ message or '' }}</textarea>

            <button type="submit">Send</button>
        </form>
    </div>
</body>
</html>
